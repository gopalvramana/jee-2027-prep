<script>
/* ═══════════════════════════════════════════════
   QUESTION DATA
   answer: 0-indexed (0=A, 1=B, 2=C, 3=D)
   section: used for filter tabs
   pyq: null or year string
═══════════════════════════════════════════════ */
const QUESTIONS = [

  /* ─── MOMENT OF INERTIA ─── */
  {
    id: 1, section: 'moi', difficulty: 'foundation', pyq: null,
    text: 'The moment of inertia of a uniform disc of mass \\(M\\) and radius \\(R\\) about an axis through its centre perpendicular to its plane is:',
    options: [
      '\\(\\dfrac{MR^2}{4}\\)',
      '\\(\\dfrac{MR^2}{2}\\)',
      '\\(MR^2\\)',
      '\\(2MR^2\\)'
    ],
    answer: 1,
    explanation: 'Standard result: \\[I_{\\text{disc, centre}} = \\frac{MR^2}{2}\\] Derivation: treat disc as concentric rings. \\(dI = r^2\\,dm = r^2\\cdot\\dfrac{2M}{R^2}r\\,dr\\). Integrate 0 to R: \\(I = \\dfrac{MR^2}{2}\\).'
  },

  {
    id: 2, section: 'moi', difficulty: 'foundation', pyq: null,
    text: 'The moment of inertia of a thin uniform ring of mass \\(M\\) and radius \\(R\\) about an axis through its centre perpendicular to its plane is:',
    options: [
      '\\(\\dfrac{MR^2}{4}\\)',
      '\\(\\dfrac{MR^2}{2}\\)',
      '\\(MR^2\\)',
      '\\(2MR^2\\)'
    ],
    answer: 2,
    explanation: 'For a thin ring, all mass is at distance \\(R\\) from the axis:<br>\\[I_{\\text{ring}} = MR^2\\]Compare with disc: \\(I_{\\text{disc}} = \\dfrac{MR^2}{2}\\) (mass distributed from 0 to R).'
  },

  {
    id: 3, section: 'moi', difficulty: 'foundation', pyq: null,
    text: 'The moment of inertia of a uniform thin rod of mass \\(M\\) and length \\(L\\) about an axis through its <strong>centre</strong> perpendicular to its length is:',
    options: [
      '\\(\\dfrac{ML^2}{12}\\)',
      '\\(\\dfrac{ML^2}{6}\\)',
      '\\(\\dfrac{ML^2}{3}\\)',
      '\\(\\dfrac{ML^2}{4}\\)'
    ],
    answer: 0,
    explanation: 'Using integration: \\(I = \\int_{-L/2}^{L/2} x^2 \\cdot \\dfrac{M}{L}\\,dx = \\dfrac{M}{L}\\cdot\\dfrac{2(L/2)^3}{3} = \\dfrac{ML^2}{12}\\).'
  },

  {
    id: 4, section: 'moi', difficulty: 'foundation', pyq: null,
    text: 'The moment of inertia of a uniform rod of mass \\(M\\) and length \\(L\\) about an axis through one <strong>end</strong> perpendicular to its length is:',
    options: [
      '\\(\\dfrac{ML^2}{12}\\)',
      '\\(\\dfrac{ML^2}{3}\\)',
      '\\(\\dfrac{ML^2}{6}\\)',
      '\\(ML^2\\)'
    ],
    answer: 1,
    explanation: 'By the parallel-axis theorem, with \\(d = L/2\\):<br>\\[I_{\\text{end}} = I_{\\text{cm}} + Md^2 = \\frac{ML^2}{12} + M\\left(\\frac{L}{2}\\right)^2 = \\frac{ML^2}{12} + \\frac{ML^2}{4} = \\frac{ML^2}{3}\\]'
  },

  {
    id: 5, section: 'moi', difficulty: 'medium', pyq: 'JEE Main 2018',
    text: 'The moment of inertia of a disc of mass \\(M\\) and radius \\(R\\) about an axis <strong>tangent to its rim and perpendicular to its plane</strong> is:',
    options: [
      '\\(\\dfrac{MR^2}{2}\\)',
      '\\(MR^2\\)',
      '\\(\\dfrac{3MR^2}{2}\\)',
      '\\(2MR^2\\)'
    ],
    answer: 2,
    explanation: 'Apply the parallel-axis theorem. The axis is at perpendicular distance \\(d = R\\) from the centre axis:<br>\\[I = I_{\\text{cm}} + Md^2 = \\frac{MR^2}{2} + MR^2 = \\frac{3MR^2}{2}\\]'
  },

  {
    id: 6, section: 'moi', difficulty: 'medium', pyq: null,
    text: 'Two point masses \\(m\\) each are connected by a massless rod of length \\(2a\\). The moment of inertia about an axis through the midpoint perpendicular to the rod is:',
    options: [
      '\\(2ma^2\\)',
      '\\(4ma^2\\)',
      '\\(ma^2\\)',
      '\\(8ma^2\\)'
    ],
    answer: 0,
    explanation: 'Each mass is at distance \\(a\\) from the midpoint. Moment of inertia:<br>\\[I = m\\cdot a^2 + m\\cdot a^2 = 2ma^2\\]'
  },

  {
    id: 7, section: 'moi', difficulty: 'medium', pyq: 'JEE Main 2016',
    text: 'The moment of inertia of a disc of mass \\(M\\) and radius \\(R\\) about an axis tangent to the disc in the <strong>plane of the disc</strong> is:',
    options: [
      '\\(\\dfrac{MR^2}{4}\\)',
      '\\(\\dfrac{MR^2}{2}\\)',
      '\\(\\dfrac{5MR^2}{4}\\)',
      '\\(\\dfrac{3MR^2}{2}\\)'
    ],
    answer: 2,
    explanation: 'The axis is tangent in-plane, i.e., parallel to the diameter at distance \\(R\\).<br>First find \\(I_{\\text{diameter}} = \\dfrac{MR^2}{4}\\) (perpendicular axis theorem: \\(I_z = I_x + I_y\\), with \\(I_x = I_y\\) → \\(I_{\\text{diameter}} = \\dfrac{MR^2}{4}\\)).<br>Then apply parallel axis with \\(d = R\\):<br>\\[I = \\frac{MR^2}{4} + MR^2 = \\frac{5MR^2}{4}\\]'
  },

  {
    id: 8, section: 'moi', difficulty: 'medium', pyq: null,
    text: 'A uniform solid sphere of mass \\(M\\) and radius \\(R\\). The ratio of its moment of inertia about an axis through its centre to that of a hollow spherical shell of the same mass and radius about a similar axis is:',
    options: [
      '\\(2:3\\)',
      '\\(3:5\\)',
      '\\(5:3\\)',
      '\\(3:2\\)'
    ],
    answer: 1,
    explanation: '\\(I_{\\text{solid sphere}} = \\dfrac{2}{5}MR^2\\), \\(I_{\\text{hollow shell}} = \\dfrac{2}{3}MR^2\\).<br>\\[\\frac{I_{\\text{solid}}}{I_{\\text{shell}}} = \\frac{2/5}{2/3} = \\frac{3}{5}\\] So the ratio solid : shell = \\(3:5\\).'
  },

  /* ─── TORQUE & DYNAMICS ─── */
  {
    id: 9, section: 'torque', difficulty: 'foundation', pyq: null,
    text: 'A disc of moment of inertia \\(0.5\\) kg·m² is acted on by a net torque of \\(2\\) N·m. The angular acceleration of the disc is:',
    options: [
      '\\(1\\) rad/s²',
      '\\(2\\) rad/s²',
      '\\(4\\) rad/s²',
      '\\(8\\) rad/s²'
    ],
    answer: 2,
    explanation: '\\(\\tau = I\\alpha \\Rightarrow \\alpha = \\dfrac{\\tau}{I} = \\dfrac{2}{0.5} = \\mathbf{4}\\) rad/s².'
  },

  {
    id: 10, section: 'torque', difficulty: 'foundation', pyq: null,
    text: 'A flywheel of moment of inertia \\(2\\) kg·m² spins at \\(10\\) rad/s. Its angular momentum is:',
    options: [
      '\\(5\\) kg·m²/s',
      '\\(10\\) kg·m²/s',
      '\\(20\\) kg·m²/s',
      '\\(40\\) kg·m²/s'
    ],
    answer: 2,
    explanation: '\\(L = I\\omega = 2 \\times 10 = \\mathbf{20}\\) kg·m²/s.'
  },

  {
    id: 11, section: 'torque', difficulty: 'medium', pyq: 'JEE Main 2015',
    text: 'A net torque of \\(2\\) N·m acts on a rigid body for \\(5\\) s. The change in angular momentum of the body is:',
    options: [
      '\\(2.5\\) kg·m²/s',
      '\\(5\\) kg·m²/s',
      '\\(10\\) kg·m²/s',
      '\\(20\\) kg·m²/s'
    ],
    answer: 2,
    explanation: 'By the angular impulse-momentum theorem: \\(\\Delta L = \\tau \\cdot \\Delta t = 2 \\times 5 = \\mathbf{10}\\) kg·m²/s.<br>(Rotational analogue of linear impulse \\(J = F\\Delta t = \\Delta p\\).)'
  },

  {
    id: 12, section: 'torque', difficulty: 'medium', pyq: null,
    text: 'A uniform horizontal rod of mass \\(M\\) and length \\(L\\) is pivoted at one end. A vertical force \\(F\\) at the free end supports it horizontal. For equilibrium, \\(F\\) equals:',
    options: [
      '\\(\\dfrac{Mg}{4}\\)',
      '\\(\\dfrac{Mg}{2}\\)',
      '\\(Mg\\)',
      '\\(2Mg\\)'
    ],
    answer: 1,
    explanation: 'Taking torques about the pivot:<br>\\(\\tau_{F} = F \\cdot L\\) (anticlockwise, upward force at distance \\(L\\)).<br>\\(\\tau_{\\text{gravity}} = Mg \\cdot \\dfrac{L}{2}\\) (clockwise, weight acts at centre).<br>Equilibrium: \\(F \\cdot L = Mg \\cdot \\dfrac{L}{2} \\Rightarrow F = \\dfrac{Mg}{2}\\).',
    diagram: `<svg viewBox="0 0 260 90" width="260" height="90">
      <line x1="30" y1="50" x2="220" y2="50" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
      <!-- Pivot -->
      <polygon points="30,50 22,68 38,68" fill="#64748b"/>
      <line x1="15" y1="68" x2="45" y2="68" stroke="#64748b" stroke-width="2"/>
      <!-- Weight Mg at centre -->
      <line x1="125" y1="50" x2="125" y2="76" stroke="#dc2626" stroke-width="2" marker-end="url(#wa)"/>

/* ═══════════════════════════════════════════════
   RENDER + INTERACTION
═══════════════════════════════════════════════ */

const SECTION_META = {
  'moi':          { label: 'A. Moment of Inertia',                       icon: '⊙' },
  'torque':       { label: 'B. Torque, Angular Acceleration &amp; Work', icon: 'τ' },
  'ang-momentum': { label: 'C. Angular Momentum &amp; Rolling',          icon: '🌀' }
};

let state = {}; // { qId: { chosen: int, revealed: bool } }

function buildPage(filterKey) {
  const container = document.getElementById('main-content');
  container.innerHTML = '';

  let lastSection = null;
  let shown = 0;

  QUESTIONS.forEach(q => {
    // Filter
    const pyqMatch = filterKey === 'pyq' && q.pyq;
    if (filterKey !== 'all' && filterKey !== 'pyq' && q.section !== filterKey) return;
    if (filterKey === 'pyq' && !pyqMatch) return;
    shown++;

    // Section heading
    if (filterKey === 'all' || filterKey === 'pyq') {
      const sm = SECTION_META[q.section];
      if (sm && q.section !== lastSection) {
        lastSection = q.section;
        const h = document.createElement('div');
        h.className = 'section-heading';
        h.innerHTML = `${sm.icon} &nbsp; ${sm.label}`;
        container.appendChild(h);
      }
    }

    const s = state[q.id] || {};
    const answered = s.chosen !== undefined;
    const correct  = answered && s.chosen === q.answer;

    // Tags
    let tagHtml = '';
    if (q.pyq) tagHtml += `<span class="q-tag tag-pyq">${q.pyq}</span>`;
    const diffLabel = { foundation: 'Foundation', medium: 'Medium', hard: 'Hard' }[q.difficulty];
    const diffClass = { foundation: 'tag-foundation', medium: 'tag-medium', hard: 'tag-hard' }[q.difficulty];
    tagHtml += `<span class="q-tag ${diffClass}">${diffLabel}</span>`;

    // Options HTML
    const letters = ['A','B','C','D'];
    let optsHtml = '<div class="q-options">';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if (answered) {
        cls += ' disabled';
        if (i === q.answer) cls += ' correct';
        else if (i === s.chosen) cls += ' wrong-sel';
      }
      optsHtml += `<div class="${cls}" onclick="chooseOption(${q.id},${i})">
        <span class="opt-letter">${letters[i]}</span>
        <span class="opt-text">${opt}</span>
      </div>`;
    });
    optsHtml += '</div>';

    // Answer box
    const aVisible = s.revealed ? 'visible' : '';
    const answerHtml = `
      <div class="answer-box ${aVisible}" id="ans-${q.id}">
        <div class="answer-correct-label">✓ Correct Answer: ${letters[q.answer]}</div>
        <div>${q.explanation}</div>
      </div>`;

    // Card
    const numClass = answered ? (correct ? 'correct-num' : 'wrong-num') : '';
    const cardClass = answered ? (correct ? 'answered-correct' : 'answered-wrong') : '';

    const card = document.createElement('div');
    card.className = `q-card ${cardClass}`;
    card.id = `card-${q.id}`;
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num ${numClass}">${q.id}</div>
        <div style="flex:1">
          <div class="q-meta">${tagHtml}</div>
        </div>
      </div>
      <div class="q-body">
        <div class="q-text">${q.text}</div>
        ${q.diagram ? `<div class="q-diagram">${q.diagram}</div>` : ''}
        ${optsHtml}
      </div>
      <div class="q-footer">
        <button class="btn-reveal" id="btn-${q.id}" onclick="revealAnswer(${q.id})"
          ${s.revealed ? 'disabled' : ''}>
          ${s.revealed ? '✓ Shown' : 'Reveal Answer'}
        </button>
        ${answerHtml}
      </div>`;
    container.appendChild(card);
  });

  if (shown === 0) {
    container.innerHTML = '<p style="color:var(--ink3);padding:2rem;text-align:center">No questions in this filter.</p>';
  }

  // Trigger MathJax re-typeset
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(e => console.warn(e));
  }
}

function chooseOption(qId, idx) {
  if (state[qId] && state[qId].chosen !== undefined) return; // already answered
  state[qId] = state[qId] || {};
  state[qId].chosen = idx;
  updateScore();
  // Re-render current filter
  const activeTab = document.querySelector('.filter-tab.active');
  buildPage(activeTab ? activeTab.dataset.filter : 'all');
  // Scroll to keep card visible
  const card = document.getElementById(`card-${qId}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function revealAnswer(qId) {
  state[qId] = state[qId] || {};
  state[qId].revealed = true;
  const box = document.getElementById(`ans-${qId}`);
  const btn = document.getElementById(`btn-${qId}`);
  if (box) { box.classList.add('visible'); }
  if (btn) { btn.disabled = true; btn.textContent = '✓ Shown'; }
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([box]).catch(e => console.warn(e));
  }
}

function updateScore() {
  let correct = 0, wrong = 0;
  QUESTIONS.forEach(q => {
    const s = state[q.id];
    if (!s || s.chosen === undefined) return;
    if (s.chosen === q.answer) correct++;
    else wrong++;
  });
  const total = correct + wrong;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-total').textContent = total;
  document.getElementById('score-bar').style.width = (total / QUESTIONS.length * 100) + '%';
}

function setFilter(key, el) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  buildPage(key);
}

function resetAll() {
  if (!confirm('Reset all answers and progress?')) return;
  state = {};
  updateScore();
  const active = document.querySelector('.filter-tab.active');
  buildPage(active ? active.dataset.filter : 'all');
}

// Init
buildPage('all');
updateScore();
</script>
