<script>
/* ═══════════════════════════════════════════════
   QUESTION DATA
   answer: 0-indexed (0=A, 1=B, 2=C, 3=D)
   section: used for filter tabs
   pyq: null or year string
═══════════════════════════════════════════════ */
const QUESTIONS = [

  /* ─── OHM'S LAW & DRIFT VELOCITY ─── */
  {
    id:1, section:'ohms-law', difficulty:'foundation', pyq:null,
    text:'The resistance of a metallic conductor in terms of microscopic quantities — electron density \\(n\\), electronic charge \\(e\\), mass of electron \\(m\\), relaxation time \\(\\tau\\), length \\(l\\), and cross-section \\(A\\) — is:',
    options:['\\(R = \\dfrac{ml}{ne^2\\tau A}\\)','\\(R = \\dfrac{ne^2\\tau A}{ml}\\)','\\(R = \\dfrac{m}{ne^2\\tau}\\)','\\(R = \\dfrac{ne^2\\tau}{mA}\\)'],
    answer:0,
    explanation:'From microscopic model: drift velocity \\(v_d = \\dfrac{e\\tau}{m}E\\). Current \\(I = nAev_d = \\dfrac{ne^2\\tau A}{m}E\\). Since \\(V = El\\): \\[R = \\frac{V}{I} = \\frac{El}{nAe^2\\tau E/m} = \\frac{ml}{ne^2\\tau A}\\] This shows \\(\\rho = m/(ne^2\\tau)\\).'
  },
  {
    id:2, section:'ohms-law', difficulty:'foundation', pyq:'JEE Main 2018',
    text:'The EMF of a source is best defined as:',
    options:['Current per unit resistance','Charge per unit time','Power per unit current','Work done per unit charge moved around the circuit'],
    answer:3,
    explanation:'EMF (\\(\\mathcal{E}\\)) = work done by the source per unit positive charge moved through the complete circuit: \\[\\mathcal{E} = \\frac{W}{q} = \\frac{\\text{energy}}{\\text{charge}}\\text{ (J/C = V)}\\] It represents the non-electrostatic work done inside the source (chemical, mechanical, etc.) per unit charge.'
  },
  {
    id:3, section:'ohms-law', difficulty:'foundation', pyq:'JEE Main 2015',
    text:'A wire has two sections P (large cross-section area) and Q (small cross-section area). The same current flows through both. The drift velocities satisfy:',
    options:['\\(v_P = v_Q\\)','\\(v_P < v_Q\\)','\\(v_P > v_Q\\)','Cannot be compared'],
    answer:1,
    explanation:'From \\(I = nAev_d\\): for the same current \\(I\\) and same electron density \\(n\\), the drift velocity \\(v_d = I/(nAe)\\). Since \\(A_P > A_Q\\), we have \\[v_P = \\frac{I}{nA_P e} < \\frac{I}{nA_Q e} = v_Q\\] The narrower section has <strong>higher</strong> drift velocity.'
  },
  {
    id:4, section:'ohms-law', difficulty:'foundation', pyq:null,
    text:'Which property of a metallic conductor remains approximately constant when temperature changes?',
    options:['Resistivity','Number density of free electrons (\\(n\\))','Relaxation time (\\(\\tau\\))','Resistance'],
    answer:1,
    explanation:'In metals, the number of conduction electrons per unit volume (\\(n\\)) is essentially determined by crystal structure — it does NOT change significantly with temperature.<br>What changes with temperature: relaxation time \\(\\tau\\) decreases (more lattice vibrations), so resistivity \\(\\rho = m/(ne^2\\tau)\\) increases, and resistance increases.'
  },
  {
    id:5, section:'ohms-law', difficulty:'medium', pyq:null,
    text:'In a metallic conductor, the net current at equilibrium (no applied field) is due to:',
    options:['Only drift velocity of electrons','Only thermal (random) velocity','Both drift and thermal velocities equally','Neither — there is no motion'],
    answer:0,
    explanation:'Electrons in a metal always have random thermal motion, but this averages to zero net current (equal electrons moving in all directions). A net current flows only due to the <strong>drift velocity</strong> \\(v_d\\) imparted by the applied electric field. Hence net current = \\(I = nAev_d\\).'
  },
  {
    id:6, section:'ohms-law', difficulty:'medium', pyq:'JEE Main 2020 Sep',
    text:'Two wires are made of the same material. Wire 1 has length \\(L\\) and diameter \\(d\\). Wire 2 has length \\(L\\) and diameter \\(2d\\). The ratio of resistance \\(R_1 : R_2\\) is:',
    options:['\\(1:1\\)','\\(1:2\\)','\\(4:1\\)','\\(2:1\\)'],
    answer:2,
    explanation:'\\(R = \\dfrac{\\rho L}{A} = \\dfrac{\\rho L}{\\pi(d/2)^2}\\), so \\(R \\propto 1/d^2\\) (same \\(L\\), \\(\\rho\\)).<br>\\[\\frac{R_1}{R_2} = \\frac{(2d)^2}{d^2} = 4\\] Ratio \\(R_1 : R_2 = \\mathbf{4:1}\\).'
  },
  {
    id:7, section:'ohms-law', difficulty:'medium', pyq:'JEE Main 2013',
    text:'The resistance of a metallic wire increases with temperature because:',
    options:['Atoms of the metal vibrate with greater amplitude, increasing collisions with electrons','The number of free electrons decreases','The mean free path increases','The effective charge on electrons decreases'],
    answer:0,
    explanation:'As temperature increases: lattice ions vibrate with greater amplitude → electrons collide more frequently with the lattice → relaxation time \\(\\tau\\) decreases → resistivity \\(\\rho = m/(ne^2\\tau)\\) increases → resistance increases.<br>The electron density \\(n\\) does NOT decrease in metals with temperature.'
  },

  /* ─── CIRCUITS & KIRCHHOFF ─── */
  {
    id:8, section:'circuits', difficulty:'foundation', pyq:null,
    text:'Three resistors, each of \\(12\\,\\Omega\\), are connected in parallel. The equivalent resistance is:',
    options:['\\(36\\,\\Omega\\)','\\(4\\,\\Omega\\)','\\(12\\,\\Omega\\)','\\(6\\,\\Omega\\)'],
    answer:1,
    explanation:'For \\(n\\) identical resistors \\(R\\) in parallel: \\(R_{\\text{eff}} = R/n\\).<br>\\[R_{\\text{eff}} = \\frac{12}{3} = \\mathbf{4}\\,\\Omega\\]General: \\(\\dfrac{1}{R_{\\text{eff}}} = \\dfrac{1}{12}+\\dfrac{1}{12}+\\dfrac{1}{12} = \\dfrac{3}{12} \\Rightarrow R_{\\text{eff}} = 4\\,\\Omega\\).'
  },
  {
    id:9, section:'circuits', difficulty:'foundation', pyq:null,
    text:'A battery of EMF \\(10\\) V and internal resistance \\(2\\,\\Omega\\) is connected to an external resistance of \\(498\\,\\Omega\\). The current in the circuit is:',
    options:['\\(20\\) mA','\\(10\\) mA','\\(50\\) mA','\\(5\\) mA'],
    answer:0,
    explanation:'\\[I = \\frac{\\mathcal{E}}{R + r} = \\frac{10}{498 + 2} = \\frac{10}{500} = 0.02\\text{ A} = \\mathbf{20}\\text{ mA}\\]'
  },
  {
    id:10, section:'circuits', difficulty:'medium', pyq:'JEE Main 2016',
    text:'A battery (EMF \\(5\\) V, internal resistance \\(1\\,\\Omega\\)) is connected to external \\(R = 1.5\\,\\Omega\\). The terminal voltage of the battery is:',
    options:['\\(5\\) V','\\(2\\) V','\\(3\\) V','\\(4\\) V'],
    answer:2,
    explanation:'Current: \\(I = \\dfrac{\\mathcal{E}}{R+r} = \\dfrac{5}{1.5+1} = \\dfrac{5}{2.5} = 2\\) A.<br>Terminal voltage: \\[V = \\mathcal{E} - Ir = 5 - 2\\times1 = \\mathbf{3}\\text{ V}\\]Alternatively: \\(V = IR = 2\\times1.5 = 3\\) V ✓'
  },
  {
    id:11, section:'circuits', difficulty:'medium', pyq:null,
    text:'A battery is being charged at \\(2\\) A. The terminal voltage during charging is \\(14\\) V and the internal resistance is \\(1\\,\\Omega\\). The EMF of the battery is:',
    options:['\\(12\\) V','\\(14\\) V','\\(16\\) V','\\(28\\) V'],
    answer:0,
    explanation:'During charging: terminal voltage \\(= \\mathcal{E} + Ir\\) (because current is forced in against the EMF).<br>\\[14 = \\mathcal{E} + 2\\times1 \\Rightarrow \\mathcal{E} = 14 - 2 = \\mathbf{12}\\text{ V}\\]Compare discharging: \\(V = \\mathcal{E} - Ir\\). During charging, \\(V = \\mathcal{E} + Ir > \\mathcal{E}\\).'
  },
  {
    id:12, section:'circuits', difficulty:'medium', pyq:'AIEEE 2005',
    text:'A battery of EMF \\(6\\) V and internal resistance \\(2\\,\\Omega\\) is connected in series with \\(R = 4\\,\\Omega\\). The current through the circuit is:',
    options:['\\(0.5\\) A','\\(1\\) A','\\(3\\) A','\\(2\\) A'],
    answer:1,
    explanation:'\\[I = \\frac{\\mathcal{E}}{R+r} = \\frac{6}{4+2} = \\frac{6}{6} = \\mathbf{1}\\text{ A}\\]'
  },
  {
    id:13, section:'circuits', difficulty:'medium', pyq:null,
    text:'A battery delivers \\(2\\) A through an external resistance of \\(5\\,\\Omega\\) and \\(1\\) A through \\(11\\,\\Omega\\). The internal resistance of the battery is:',
    options:['\\(1\\,\\Omega\\)','\\(2\\,\\Omega\\)','\\(3\\,\\Omega\\)','\\(4\\,\\Omega\\)'],
    answer:0,
    explanation:'Using \\(\\mathcal{E} = I(R+r)\\) for both cases:<br>\\(\\mathcal{E} = 2(5+r) = 10 + 2r\\)<br>\\(\\mathcal{E} = 1(11+r) = 11 + r\\)<br>Setting equal: \\(10 + 2r = 11 + r \\Rightarrow r = \\mathbf{1}\\,\\Omega\\).<br>Also \\(\\mathcal{E} = 12\\) V.'
  },
  {
    id:14, section:'circuits', difficulty:'medium', pyq:'JEE Main 2019',
    text:'Two identical cells, each with EMF \\(2\\) V and internal resistance \\(1\\,\\Omega\\), are connected in parallel. The effective internal resistance of the combination is:',
    options:['\\(2\\,\\Omega\\)','\\(1\\,\\Omega\\)','\\(0.5\\,\\Omega\\)','\\(0.25\\,\\Omega\\)'],
    answer:2,

  {

/* ═══════════════════════════════════════════════
   RENDER + INTERACTION
═══════════════════════════════════════════════ */

const SECTION_META = {
  'ohms-law':   { label: "A. Microscopic Ohm's Law &amp; Drift Velocity", icon: '⚡' },
  'circuits':   { label: 'B. Circuits &amp; Kirchhoff\'s Laws',            icon: '⊕' },
  'temp-energy':{ label: 'C. Temperature Dependence &amp; Energy',         icon: '🌡' }
};

let state = {}; // { qId: { chosen: int, revealed: bool } }

function buildPage(filterKey) {
  const container = document.getElementById('main-content');
  container.innerHTML = '';

  let lastSection = null;
  let shown = 0;

  QUESTIONS.forEach(q => {
    // Filter
    const pyqMatch = filterKey === 'pyq' && q.pyq;
    if (filterKey !== 'all' && filterKey !== 'pyq' && q.section !== filterKey) return;
    if (filterKey === 'pyq' && !pyqMatch) return;
    shown++;

    // Section heading
    if (filterKey === 'all' || filterKey === 'pyq') {
      const sm = SECTION_META[q.section];
      if (sm && q.section !== lastSection) {
        lastSection = q.section;
        const h = document.createElement('div');
        h.className = 'section-heading';
        h.innerHTML = `${sm.icon} &nbsp; ${sm.label}`;
        container.appendChild(h);
      }
    }

    const s = state[q.id] || {};
    const answered = s.chosen !== undefined;
    const correct  = answered && s.chosen === q.answer;

    // Tags
    let tagHtml = '';
    if (q.pyq) tagHtml += `<span class="q-tag tag-pyq">${q.pyq}</span>`;
    const diffLabel = { foundation: 'Foundation', medium: 'Medium', hard: 'Hard' }[q.difficulty];
    const diffClass = { foundation: 'tag-foundation', medium: 'tag-medium', hard: 'tag-hard' }[q.difficulty];
    tagHtml += `<span class="q-tag ${diffClass}">${diffLabel}</span>`;

    // Options HTML
    const letters = ['A','B','C','D'];
    let optsHtml = '<div class="q-options">';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if (answered) {
        cls += ' disabled';
        if (i === q.answer) cls += ' correct';
        else if (i === s.chosen) cls += ' wrong-sel';
      }
      optsHtml += `<div class="${cls}" onclick="chooseOption(${q.id},${i})">
        <span class="opt-letter">${letters[i]}</span>
        <span class="opt-text">${opt}</span>
      </div>`;
    });
    optsHtml += '</div>';

    // Answer box
    const aVisible = s.revealed ? 'visible' : '';
    const answerHtml = `
      <div class="answer-box ${aVisible}" id="ans-${q.id}">
        <div class="answer-correct-label">✓ Correct Answer: ${letters[q.answer]}</div>
        <div>${q.explanation}</div>
      </div>`;

    // Card
    const numClass = answered ? (correct ? 'correct-num' : 'wrong-num') : '';
    const cardClass = answered ? (correct ? 'answered-correct' : 'answered-wrong') : '';

    const card = document.createElement('div');
    card.className = `q-card ${cardClass}`;
    card.id = `card-${q.id}`;
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num ${numClass}">${q.id}</div>
        <div style="flex:1">
          <div class="q-meta">${tagHtml}</div>
        </div>
      </div>
      <div class="q-body">
        <div class="q-text">${q.text}</div>
        ${q.diagram ? `<div class="q-diagram">${q.diagram}</div>` : ''}
        ${optsHtml}
      </div>
      <div class="q-footer">
        <button class="btn-reveal" id="btn-${q.id}" onclick="revealAnswer(${q.id})"
          ${s.revealed ? 'disabled' : ''}>
          ${s.revealed ? '✓ Shown' : 'Reveal Answer'}
        </button>
        ${answerHtml}
      </div>`;
    container.appendChild(card);
  });

  if (shown === 0) {
    container.innerHTML = '<p style="color:var(--ink3);padding:2rem;text-align:center">No questions in this filter.</p>';
  }

  // Trigger MathJax re-typeset
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(e => console.warn(e));
  }
}

function chooseOption(qId, idx) {
  if (state[qId] && state[qId].chosen !== undefined) return; // already answered
  state[qId] = state[qId] || {};
  state[qId].chosen = idx;
  updateScore();
  // Re-render current filter
  const activeTab = document.querySelector('.filter-tab.active');
  buildPage(activeTab ? activeTab.dataset.filter : 'all');
  // Scroll to keep card visible
  const card = document.getElementById(`card-${qId}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function revealAnswer(qId) {
  state[qId] = state[qId] || {};
  state[qId].revealed = true;
  const box = document.getElementById(`ans-${qId}`);
  const btn = document.getElementById(`btn-${qId}`);
  if (box) { box.classList.add('visible'); }
  if (btn) { btn.disabled = true; btn.textContent = '✓ Shown'; }
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([box]).catch(e => console.warn(e));
  }
}

function updateScore() {
  let correct = 0, wrong = 0;
  QUESTIONS.forEach(q => {
    const s = state[q.id];
    if (!s || s.chosen === undefined) return;
    if (s.chosen === q.answer) correct++;
    else wrong++;
  });
  const total = correct + wrong;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-total').textContent = total;
  document.getElementById('score-bar').style.width = (total / QUESTIONS.length * 100) + '%';
}

function setFilter(key, el) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  buildPage(key);
}

function resetAll() {
  if (!confirm('Reset all answers and progress?')) return;
  state = {};
  updateScore();
  const active = document.querySelector('.filter-tab.active');
  buildPage(active ? active.dataset.filter : 'all');
}

// Init
buildPage('all');
updateScore();
</script>
