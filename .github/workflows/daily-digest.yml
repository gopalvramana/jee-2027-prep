name: Daily JEE Progress Digest

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC  (UTC + 5:30)
    - cron: '30 0 * * *'
  # Allow a one-click manual run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata   # makes new Date() use IST inside the script

    steps:
      - name: Download script and send digest
        env:
          GIST_TOKEN:         ${{ secrets.GIST_TOKEN }}
          GIST_ID:            ${{ secrets.GIST_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL:    ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          # Download send-digest.js directly from this repo via GitHub API
          # (uses the auto-provided GITHUB_TOKEN — no checkout action needed)
          curl -sf \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/scripts/send-digest.js" \
            -o send-digest.js
          npm install --silent nodemailer
          node send-digest.js
