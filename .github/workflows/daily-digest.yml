name: Daily JEE Progress Digest

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC  (UTC + 5:30)
    - cron: '30 0 * * *'
  # Allow a one-click manual run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata   # makes new Date() use IST inside the script

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily digest email
        env:
          GIST_TOKEN:      ${{ secrets.GIST_TOKEN }}
          GIST_ID:         ${{ secrets.GIST_ID }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: node scripts/send-digest.js
