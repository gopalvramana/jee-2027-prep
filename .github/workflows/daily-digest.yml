name: Daily JEE Progress Digest

on:
  schedule:
    # 5:30 PM CDT (UTC-5) = 22:30 UTC  — Mar–Nov (daylight saving)
    # Note: during CST (UTC-6, Nov–Mar) this fires at 4:30 PM CT instead
    - cron: '30 22 * * *'
  # Allow a one-click manual run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      TZ: America/Chicago   # US Central — date display matches recipient's timezone

    steps:
      - name: Download script and send digest
        env:
          GIST_TOKEN:         ${{ secrets.GIST_TOKEN }}
          GIST_ID:            ${{ secrets.GIST_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL:    ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          # Download send-digest.js directly from this repo via GitHub API
          # (uses the auto-provided GITHUB_TOKEN — no checkout action needed)
          curl -sf \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/scripts/send-digest.js" \
            -o send-digest.js
          npm install --silent nodemailer
          node send-digest.js
