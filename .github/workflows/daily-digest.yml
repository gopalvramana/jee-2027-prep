name: Daily JEE Progress Digest

on:
  schedule:
    # Runs at 07:00 IST (01:30 UTC) every day
    - cron: '30 1 * * *'
  # Allow a one-click manual run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --silent nodemailer firebase-admin

      - name: Send personalised digest to all users
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/send-digest.js
