<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Atom nucleus -->
  <circle cx="16" cy="16" r="2.2" fill="#38bdf8"/>
  <!-- Orbit 1 — horizontal -->
  <ellipse cx="16" cy="16" rx="11" ry="4" fill="none" stroke="#38bdf8" stroke-width="1.4"/>
  <!-- Orbit 2 — tilted 60° -->
  <ellipse cx="16" cy="16" rx="11" ry="4" fill="none" stroke="#34d399" stroke-width="1.4" transform="rotate(60 16 16)"/>
  <!-- Orbit 3 — tilted 120° -->
  <ellipse cx="16" cy="16" rx="11" ry="4" fill="none" stroke="#fbbf24" stroke-width="1.4" transform="rotate(120 16 16)"/>
</svg>
