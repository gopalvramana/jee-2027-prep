<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — JEE 2027 Prep</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; background: var(--ink); }

  .login-bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 20% 30%, rgba(29,78,216,.3) 0%, transparent 55%),
      radial-gradient(ellipse 60% 70% at 80% 70%, rgba(15,118,110,.25) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(109,40,217,.15) 0%, transparent 60%);
    z-index: 0;
  }
  .login-grid-bg {
    position: fixed; inset: 0; z-index: 0; opacity: .04;
    background-image:
      linear-gradient(rgba(255,255,255,.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.5) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .login-wrap {
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }

  /* Brand */
  .login-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem; color: white;
    margin-bottom: .25rem; text-align: center;
  }
  .login-tagline {
    font-size: .8rem; color: rgba(255,255,255,.45);
    margin-bottom: 2rem; text-align: center;
    letter-spacing: .03em;
  }

  /* Card */
  .login-card {
    background: white; border-radius: 16px;
    width: 100%; max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,.5);
    overflow: hidden;
  }

  /* Tabs */
  .login-tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--line);
  }
  .login-tab {
    padding: 1rem; text-align: center;
    font-size: .875rem; font-weight: 600; cursor: pointer;
    color: var(--ink3); background: var(--bg);
    border: none; transition: all .15s;
  }
  .login-tab.active {
    color: var(--ink); background: white;
    border-bottom: 2px solid var(--math);
    margin-bottom: -1px;
  }

  /* Body */
  .login-body { padding: 2rem; }

  .login-section { display: none; }
  .login-section.active { display: block; }

  /* Google button */
  .google-btn {
    width: 100%; padding: .75rem 1rem;
    display: flex; align-items: center; justify-content: center; gap: .75rem;
    border: 1.5px solid var(--line); border-radius: 8px;
    background: white; cursor: pointer; font-size: .9rem; font-weight: 600;
    color: var(--ink); transition: background .15s, border-color .15s, box-shadow .15s;
    margin-bottom: 1.5rem;
  }
  .google-btn:hover { background: var(--bg); border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .google-btn:disabled { opacity: .6; cursor: not-allowed; }
  .google-icon {
    width: 20px; height: 20px; flex-shrink: 0;
  }

  /* Divider */
  .login-divider {
    display: flex; align-items: center; gap: .75rem;
    margin-bottom: 1.5rem; color: var(--ink3); font-size: .8rem;
  }
  .login-divider::before, .login-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }

  /* Form */
  .login-field { margin-bottom: 1rem; }
  .login-label {
    display: block; font-size: .8rem; font-weight: 600;
    color: var(--ink2); margin-bottom: .4rem;
  }
  .login-input {
    width: 100%; padding: .7rem .9rem;
    border: 1.5px solid var(--line); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--ink);
    background: var(--bg); transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  .login-input:focus { border-color: var(--math); box-shadow: 0 0 0 3px rgba(29,78,216,.1); background: white; }
  .login-input::placeholder { color: var(--ink3); }

  /* Submit button */
  .login-submit {
    width: 100%; padding: .8rem;
    background: var(--math); color: white;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 700;
    transition: background .15s, transform .1s;
    margin-top: .5rem;
  }
  .login-submit:hover  { background: #1e40af; transform: translateY(-1px); }
  .login-submit:active { transform: translateY(0); }
  .login-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  /* Error / success */
  .login-msg {
    font-size: .82rem; padding: .65rem .9rem;
    border-radius: 7px; margin-bottom: 1rem;
    display: none;
  }
  .login-msg.error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; display: block; }
  .login-msg.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; display: block; }

  /* Forgot password */
  .login-forgot {
    display: block; text-align: right; font-size: .78rem;
    color: var(--math); margin-top: -.5rem; margin-bottom: 1rem; cursor: pointer;
  }
  .login-forgot:hover { text-decoration: underline; }

  /* Footer */
  .login-footer {
    text-align: center; font-size: .78rem; color: rgba(255,255,255,.35);
    margin-top: 1.5rem; padding-bottom: 1rem;
  }
</style>
</head>
<body>

<div class="login-bg"></div>
<div class="login-grid-bg"></div>

<div class="login-wrap">

  <div class="login-brand">JEE 2027 Prep</div>
  <p class="login-tagline">Mar 2026 → Apr 2027 · Math · Physics · Chemistry</p>

  <div class="login-card">

    <!-- tabs -->
    <div class="login-tabs">
      <button class="login-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="login-tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div class="login-body">

      <!-- ── SIGN IN ── -->
      <div class="login-section active" id="section-signin">

        <div class="login-msg" id="signin-msg"></div>

        <!-- Google -->
        <button class="google-btn" id="google-signin-btn" onclick="signInWithGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="login-divider">or sign in with email</div>

        <form onsubmit="signInWithEmail(event)">
          <div class="login-field">
            <label class="login-label" for="signin-email">Email address</label>
            <input class="login-input" id="signin-email" type="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="login-field">
            <label class="login-label" for="signin-password">Password</label>
            <input class="login-input" id="signin-password" type="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <span class="login-forgot" onclick="sendPasswordReset()">Forgot password?</span>
          <button class="login-submit" id="signin-btn" type="submit">Sign In →</button>
        </form>

      </div>

      <!-- ── SIGN UP ── -->
      <div class="login-section" id="section-signup">

        <div class="login-msg" id="signup-msg"></div>

        <!-- Google -->
        <button class="google-btn" id="google-signup-btn" onclick="signInWithGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </button>

        <div class="login-divider">or create with email</div>

        <form onsubmit="createAccount(event)">
          <div class="login-field">
            <label class="login-label" for="signup-name">Your name</label>
            <input class="login-input" id="signup-name" type="text" placeholder="Ramana" required autocomplete="name">
          </div>
          <div class="login-field">
            <label class="login-label" for="signup-email">Email address</label>
            <input class="login-input" id="signup-email" type="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="login-field">
            <label class="login-label" for="signup-password">Password <span style="font-weight:400;color:var(--ink3)">(min 6 chars)</span></label>
            <input class="login-input" id="signup-password" type="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
          </div>
          <button class="login-submit" id="signup-btn" type="submit">Create Account →</button>
        </form>

      </div>

    </div><!-- /login-body -->
  </div><!-- /login-card -->

  <p class="login-footer">Your progress is saved to the cloud — accessible on any device.</p>

</div><!-- /login-wrap -->

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script>
// ── Tab switcher ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.login-tab, .login-section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('section-' + tab).classList.add('active');
  clearMsgs();
}

function clearMsgs() {
  document.querySelectorAll('.login-msg').forEach(el => { el.className = 'login-msg'; el.textContent = ''; });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'login-msg ' + type;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  if (loading) btn.textContent = '...';
}

// ── Friendly error messages ──────────────────────────────────────────────────
function friendlyError(code) {
  const map = {
    'auth/user-not-found':       'No account found with that email.',
    'auth/wrong-password':       'Incorrect password. Try again.',
    'auth/invalid-credential':   'Incorrect email or password.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/too-many-requests':    'Too many attempts. Please wait a moment.',
    'auth/popup-closed-by-user': 'Sign-in popup was closed. Please try again.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

// ── Redirect after login ─────────────────────────────────────────────────────
function redirectAfterLogin() {
  const params = new URLSearchParams(window.location.search);
  const next   = params.get('next');
  window.location.replace(next && next.startsWith('http') ? next : 'index.html');
}

// ── Google sign-in ───────────────────────────────────────────────────────────
async function signInWithGoogle() {
  clearMsgs();
  document.getElementById('google-signin-btn')?.setAttribute('disabled', true);
  document.getElementById('google-signup-btn')?.setAttribute('disabled', true);
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await window._auth.signInWithPopup(provider);
    redirectAfterLogin();
  } catch (e) {
    const msg = friendlyError(e.code);
    showMsg('signin-msg', msg, 'error');
    showMsg('signup-msg', msg, 'error');
  } finally {
    document.getElementById('google-signin-btn')?.removeAttribute('disabled');
    document.getElementById('google-signup-btn')?.removeAttribute('disabled');
  }
}

// ── Email / password sign-in ─────────────────────────────────────────────────
async function signInWithEmail(e) {
  e.preventDefault();
  clearMsgs();
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  setLoading('signin-btn', true);
  try {
    await window._auth.signInWithEmailAndPassword(email, password);
    redirectAfterLogin();
  } catch (err) {
    showMsg('signin-msg', friendlyError(err.code), 'error');
    document.getElementById('signin-btn').textContent = 'Sign In →';
    document.getElementById('signin-btn').disabled = false;
  }
}

// ── Create account ───────────────────────────────────────────────────────────
async function createAccount(e) {
  e.preventDefault();
  clearMsgs();
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  setLoading('signup-btn', true);
  try {
    const cred = await window._auth.createUserWithEmailAndPassword(email, password);
    await cred.user.updateProfile({ displayName: name });
    redirectAfterLogin();
  } catch (err) {
    showMsg('signup-msg', friendlyError(err.code), 'error');
    document.getElementById('signup-btn').textContent = 'Create Account →';
    document.getElementById('signup-btn').disabled = false;
  }
}

// ── Forgot password ──────────────────────────────────────────────────────────
async function sendPasswordReset() {
  clearMsgs();
  const email = document.getElementById('signin-email').value.trim();
  if (!email) {
    showMsg('signin-msg', 'Enter your email above first.', 'error');
    return;
  }
  try {
    await window._auth.sendPasswordResetEmail(email);
    showMsg('signin-msg', '✓ Password reset email sent! Check your inbox.', 'success');
  } catch (err) {
    showMsg('signin-msg', friendlyError(err.code), 'error');
  }
}
</script>
</body>
</html>
